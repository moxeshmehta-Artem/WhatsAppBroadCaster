<div class="manual-container">
  <div class="manual-card">
    
    <div class="card-header">
      <h2>📟 Send Manual Message</h2>
      <p>Instantly ping a single user via WhatsApp.</p>
    </div>

    <!-- The Form -->
    <div class="form-group">
      <label>Recipient Phone Number</label>
      <input type="text" [(ngModel)]="phoneNumber" placeholder="e.g. 919876543210">
    </div>

    <div class="form-group">
      <label>Custom Message</label>
      <textarea [(ngModel)]="messageBody" rows="4" placeholder="Type your message here..."></textarea>
    </div>

    <!-- Submit Button -->
    <button class="send-btn" [disabled]="!phoneNumber || !messageBody" (click)="onSendClick()">
      Send Now 🚀
    </button>

  </div>
</div>
