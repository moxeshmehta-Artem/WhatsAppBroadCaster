<div class="manual-container">
  <div class="manual-card">
    
    <div class="card-header">
      <h2>📟 Send Manual Message</h2>
      <p>Instantly ping a single user via WhatsApp.</p>
    </div>

    <!-- The Phone Number Input -->
    <div class="form-group phone-group">
      <label>Recipient Phone Number</label>
      <input type="text" [(ngModel)]="phoneNumber" placeholder="e.g. 919876543210">
    </div>

    <!-- The Configuration Grid -->
    <div class="controls-grid">
      <div class="form-group">
        <label>Select Provider</label>
        <select [(ngModel)]="selectedProvider">
          @for (provider of activeProviders(); track provider.providerID) {
            <option [value]="provider.providerName.toLowerCase()">{{ provider.providerName }}</option>
          }
        </select>
      </div>

      <div class="form-group">
        <label>Select Template</label>
        <select [(ngModel)]="selectedTemplate">
          <option [value]="1">Medical Camp (ID 1)</option>
          <option [value]="2">Blood Camp (ID 2)</option>
        </select>
      </div>

      <div class="form-group">
        <label>Template Variable: {{ '{Date}' }}</label>
        <input type="text" [(ngModel)]="variableDate" placeholder="e.g. 24th October">
      </div>

      <div class="form-group">
        <label>Template Variable: {{ '{address}' }}</label>
        <input type="text" [(ngModel)]="variableAddress" placeholder="e.g. City Hospital Center">
      </div>
    </div>

    <!-- Submit Button -->
    <button class="send-btn" 
        [disabled]="!phoneNumber || !variableDate || !variableAddress" 
        (click)="onSendClick()">
      Send Now
    </button>

  </div>
</div>
