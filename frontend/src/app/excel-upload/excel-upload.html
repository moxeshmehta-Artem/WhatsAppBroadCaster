<div class="upload-container">
  <div class="upload-card">
    
    <div class="card-header">
      <h2>Start a New Campaign</h2>
      <p>Configure your broadcast and upload your targets.</p>
    </div>

    <!-- NEW CONTROLS SECTION -->
    <div class="controls-grid">
      <div class="form-group">
        <label>Select Provider</label>
        <select [(ngModel)]="selectedProvider">
          @for (provider of activeProviders(); track provider.providerID) {
            <option [value]="provider.providerName.toLowerCase()">{{ provider.providerName }}</option>
          }
        </select>
      </div>

      <div class="form-group">
        <label>Select Template</label>
        <select [(ngModel)]="selectedTemplateId" (change)="onTemplateChange()">
          @for (temp of allTemplates(); track temp.id) {
            <option [value]="temp.id">{{ temp.name }}</option>
          }
        </select>
      </div>

      <!-- DYNAMIC VARIABLES SECTION -->
      @for (variable of templateVariables; track $index) {
        <div class="form-group">
          <label>Template Variable: {{ '{{' + variable.key + '}}' }}</label>
          <input type="text" [(ngModel)]="variable.value" [placeholder]="'Enter ' + variable.key">
        </div>
      }
    </div>
    <!-- END CONTROLS SECTION -->

    <!-- The physical upload box -->
    <div class="file-dropzone">
      <input type="file" id="fileInput" (change)="onFileSelected($event)" accept=".xlsx, .csv" hidden>
      <label for="fileInput" class="upload-label">
        <span class="fa-solid fa-file-excel" style="color: green;"></span>
        <span class="instruction"><strong>Click here</strong> to select an Excel file</span>
        
        @if (selectedFileName) {
          <span class="file-name">Selected: {{ selectedFileName }}</span>
        }
      </label>
    </div>

    <!-- The Action Buttons -->
    <div class="action-buttons">
      <button class="preview-btn" 
          [disabled]="!selectedFile" 
          (click)="onPreviewClick()">
        Fetch Contacts 
      </button>

      <button class="blast-btn" 
          [disabled]="isFormInvalid() || previewContacts.length === 0" 
          (click)="onUploadClick()">
        Launch WhatsApp Blast 
      </button>
    </div>

    <!-- The Contacts Preview display -->
    @if (previewContacts.length > 0) {
      <div class="contacts-preview">
        <h3>Found {{ previewContacts.length }} Targets:</h3>
        <div class="tags-container">
          @for (contact of previewContacts; track $index) {
            <span class="contact-tag">{{ contact }}</span>
          }
        </div>
      </div>
    }

  </div>
</div>
